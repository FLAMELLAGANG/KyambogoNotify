<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
<link rel="stylesheet" href="css/tailwind.offline.css">
<link rel="stylesheet" href="css/responsive.css"> 
  <!-- Plus Jakarta Sans: loads from CDN when online, falls back to system font offline -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"></noscript>
  <!-- Material Symbols: loads from CDN when online, degrades gracefully offline -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"></noscript>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Notice Detail | Kyambogo Notify</title>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1;vertical-align:middle;}
.reading-container{max-width:800px;margin:0 auto;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#725c00;border-radius:10px;}
</style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-x-hidden">

<!-- TopNav -->
<nav class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md border-b border-outline-variant/30">
  <div class="max-w-[1440px] mx-auto px-gutter py-4 flex justify-between items-center">
    <a href="discover.html" class="text-body-lg font-headline-md font-bold tracking-tighter text-on-background">Kyambogo Notify</a>
    <div class="hidden md:flex gap-8 items-center">
      <a class="text-secondary hover:text-on-background transition-colors text-label-caps font-label-caps" href="discover.html">Discover</a>
      <a class="text-secondary hover:text-on-background transition-colors text-label-caps font-label-caps" href="home.html">Home</a>
      <a class="text-secondary hover:text-on-background transition-colors text-label-caps font-label-caps" href="notices.html">Notices</a>
      <a class="text-secondary hover:text-on-background transition-colors text-label-caps font-label-caps" href="campus-news.html">Campus News</a>
    </div>
    <button onclick="showAuthModal()" class="bg-primary text-on-primary px-6 py-2.5 rounded-full text-label-caps font-label-caps flex items-center gap-2 hover:opacity-90 active:scale-95 transition-all">
      Continue with Google <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
    </button>
  </div>
</nav>

<main class="pt-32 pb-section-gap">
  <div id="notice-content" class="reading-container px-margin-mobile"></div>
  <div id="related-notices" class="max-w-[1440px] mx-auto px-gutter mt-16"></div>
</main>

<!-- Brand strip -->
<div class="w-full bg-on-tertiary-fixed py-20 overflow-hidden">
  <div class="max-w-[1440px] mx-auto px-gutter">
    <h1 class="text-display-xl font-display-xl text-primary-fixed opacity-10 tracking-tighter uppercase leading-none select-none pointer-events-none" style="font-size:120px;">Notify.</h1>
  </div>
</div>

<!-- Footer -->
<footer class="bg-on-tertiary-fixed text-secondary-fixed-dim">
  <div class="max-w-[1440px] mx-auto px-gutter pt-20 pb-10 flex flex-col gap-12">
    <div class="flex flex-col md:flex-row justify-between gap-12">
      <div class="max-w-md">
        <div class="text-primary-fixed font-display-xl tracking-tighter uppercase leading-none mb-6" style="font-size:64px;">Kyambogo</div>
        <p class="text-body-md opacity-70">The official notification hub for Kyambogo University students and staff.</p>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-3 gap-8">
        <div class="flex flex-col gap-4"><h4 class="text-label-caps font-label-caps text-primary-fixed">QUICK LINKS</h4>
          <a class="text-body-md hover:text-surface-bright transition-all" href="#">Student Portal</a>
          <a class="text-body-md hover:text-surface-bright transition-all" href="#">E-Learning</a>
        </div>
        <div class="flex flex-col gap-4"><h4 class="text-label-caps font-label-caps text-primary-fixed">SUPPORT</h4>
          <a class="text-body-md hover:text-surface-bright transition-all" href="#">FAQ</a>
          <a class="text-body-md hover:text-surface-bright transition-all" href="#">Privacy Policy</a>
        </div>
      </div>
    </div>
    <div class="pt-10 border-t border-outline/20 flex justify-between items-center">
      <p class="text-label-caps font-label-caps opacity-60">© 2026 Kyambogo Notify.</p>
    </div>
  </div>
</footer>

<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  updateNavAuth();
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var container = document.getElementById('notice-content');

  if (!id) { renderNotFound(container); return; }
  var notice = KyuDB.getNoticeById(id);
  if (!notice) { renderNotFound(container); return; }

  document.title = notice.title + ' | Kyambogo Notify';
  renderNotice(container, notice);
  renderRelated(notice);
});

function renderNotFound(c) {
  c.innerHTML = '<div style="text-align:center;padding:80px 24px;">' +
    '<span class="material-symbols-outlined" style="font-size:64px;color:#cfc6af;display:block;margin-bottom:16px;">search_off</span>' +
    '<h2 style="font-size:32px;font-weight:700;margin-bottom:12px;">Notice Not Found</h2>' +
    '<p style="color:#5f5e5e;margin-bottom:32px;">The notice you\'re looking for doesn\'t exist or may have been removed.</p>' +
    '<a href="notices.html" style="display:inline-flex;align-items:center;gap:8px;background:#725c00;color:#fff;padding:12px 28px;border-radius:100px;font-weight:700;font-size:12px;letter-spacing:0.08em;text-decoration:none;">← BACK TO NOTICES</a>' +
  '</div>';
}

function renderNotice(c, n) {
  var voteKey = 'kyu_vote_' + n.id;
  var existingVote = localStorage.getItem(voteKey);

  var breadcrumb = '<nav style="margin-bottom:48px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:0.1em;color:#5f5e5e;">' +
    '<a href="notices.html" style="color:#5f5e5e;text-decoration:none;" onmouseover="this.style.color=\'#725c00\'" onmouseout="this.style.color=\'#5f5e5e\'">NOTICES</a>' +
    '<span class="material-symbols-outlined" style="font-size:16px;">chevron_right</span>' +
    '<span style="color:#725c00;">'+n.category.toUpperCase()+'</span>' +
  '</nav>';

  var urgencyBadge = n.urgency==='urgent'
    ? '<span style="display:inline-flex;align-items:center;gap:6px;background:#ffdad6;color:#93000a;font-size:11px;font-weight:700;letter-spacing:0.08em;padding:4px 12px;border-radius:100px;margin-left:8px;"><span class="material-symbols-outlined" style="font-size:14px;">priority_high</span>URGENT</span>' : '';

  var catStyle = getCategoryStyle(n.category);
  var header = '<header style="margin-bottom:48px;">' +
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">' +
      '<span style="font-size:10px;font-weight:700;letter-spacing:0.1em;padding:4px 12px;border-radius:100px;'+catStyle+'">'+n.category.toUpperCase()+'</span>' +
      urgencyBadge +
    '</div>' +
    '<h1 style="font-size:clamp(28px,4vw,52px);font-weight:700;line-height:1.15;letter-spacing:-0.02em;margin:0 0 24px;color:#1a1c1c;">'+n.title+'</h1>' +
    '<div style="display:flex;flex-wrap:wrap;gap:24px;font-size:13px;color:#5f5e5e;padding-bottom:24px;border-bottom:1px solid #cfc6af40;">' +
      '<span style="display:flex;align-items:center;gap:6px;"><span class="material-symbols-outlined" style="font-size:16px;color:#725c00;">person</span>'+n.author+'</span>' +
      '<span style="display:flex;align-items:center;gap:6px;"><span class="material-symbols-outlined" style="font-size:16px;color:#725c00;">business</span>'+n.department+'</span>' +
      '<span style="display:flex;align-items:center;gap:6px;"><span class="material-symbols-outlined" style="font-size:16px;color:#725c00;">calendar_today</span>'+formatDate(n.date)+'</span>' +
    '</div>' +
  '</header>';

  var deadlineBox = '';
  if (n.deadline) {
    deadlineBox = '<div style="background:#ffdad6;border-left:4px solid #ba1a1a;padding:20px 24px;border-radius:4px;margin-bottom:32px;">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span class="material-symbols-outlined" style="color:#ba1a1a;font-size:20px;">schedule</span><span style="font-weight:700;font-size:12px;letter-spacing:0.08em;color:#93000a;">CRITICAL DEADLINE</span></div>' +
      '<p style="font-weight:700;font-size:18px;color:#93000a;margin:0;">'+n.deadline+'</p>' +
      '<p style="font-size:13px;color:#93000a;opacity:0.8;margin:6px 0 0;font-style:italic;">All requirements must be completed before this date.</p>' +
    '</div>';
  }

  var bodyParagraphs = (n.body||'').split('\n\n').filter(Boolean).map(p =>
    '<p style="font-size:18px;line-height:1.75;margin-bottom:24px;color:#1a1c1c;">'+p.replace(/\n/g,'<br>')+'</p>'
  ).join('');

  var requirementsSection = '';
  if (n.requirements && n.requirements.length) {
    requirementsSection = '<h2 style="font-size:28px;font-weight:700;margin:40px 0 20px;color:#1a1c1c;">Mandatory Requirements</h2>' +
      '<ul style="list-style:none;padding:0;margin:0 0 32px;display:flex;flex-direction:column;gap:14px;">' +
      n.requirements.map(r =>
        '<li style="display:flex;align-items:flex-start;gap:12px;"><span class="material-symbols-outlined" style="color:#725c00;flex-shrink:0;margin-top:2px;">check_circle</span><span style="font-size:16px;line-height:1.6;">'+r+'</span></li>'
      ).join('') +
      '</ul>';
  }

  var attachmentsSection = '';
  if (n.attachments && n.attachments.length) {
    attachmentsSection = '<section style="margin-top:64px;">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;"><div style="width:8px;height:8px;background:#725c00;border-radius:2px;"></div><h3 style="font-size:12px;font-weight:700;letter-spacing:0.1em;color:#4c4635;margin:0;">RESOURCES &amp; DOWNLOADS</h3></div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;">' +
      n.attachments.map(att =>
        '<div style="display:flex;align-items:center;justify-content:space-between;padding:20px;background:#eeeeee;border:1px solid #cfc6af40;border-radius:8px;transition:border-color 0.2s;" onmouseover="this.style.borderColor=\'#725c00\'" onmouseout="this.style.borderColor=\'#cfc6af40\'">' +
          '<div style="display:flex;align-items:center;gap:12px;"><span class="material-symbols-outlined" style="font-size:28px;color:#725c00;opacity:0.7;">picture_as_pdf</span><div><p style="font-weight:700;font-size:14px;margin:0;">'+att.name+'</p><p style="font-size:11px;color:#5f5e5e;margin:4px 0 0;font-weight:700;letter-spacing:0.06em;">'+att.size+' · '+att.date+'</p></div></div>' +
          '<span class="material-symbols-outlined" style="color:#5f5e5e;cursor:pointer;">download</span>' +
        '</div>'
      ).join('') +
      '</div></section>';
  }

  var shareFooter = '<footer style="margin-top:48px;padding-top:32px;border-top:1px solid #cfc6af40;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:16px;">' +
    '<div style="display:flex;gap:12px;">' +
      '<button onclick="shareNotice()" style="display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:0.08em;color:#5f5e5e;background:none;border:1px solid #cfc6af;padding:10px 18px;border-radius:100px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.borderColor=\'#725c00\';this.style.color=\'#725c00\'" onmouseout="this.style.borderColor=\'#cfc6af\';this.style.color=\'#5f5e5e\'"><span class="material-symbols-outlined" style="font-size:18px;">share</span>SHARE NOTICE</button>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:12px;">' +
      '<span style="font-size:11px;font-weight:700;letter-spacing:0.08em;color:#5f5e5e;">WAS THIS HELPFUL?</span>' +
      '<button id="btn-thumbup" onclick="castVote(\'up\')" style="width:40px;height:40px;border-radius:100px;background:'+(existingVote==='up'?'#ebc84e':'#eeeeee')+';border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;">' +
        '<span class="material-symbols-outlined" style="font-size:20px;">thumb_up</span>' +
      '</button>' +
      '<button id="btn-thumbdown" onclick="castVote(\'down\')" style="width:40px;height:40px;border-radius:100px;background:'+(existingVote==='down'?'#ffdad6':'#eeeeee')+';border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;">' +
        '<span class="material-symbols-outlined" style="font-size:20px;">thumb_down</span>' +
      '</button>' +
    '</div>' +
  '</footer>';

  c.innerHTML = breadcrumb + '<article>' + header + deadlineBox + bodyParagraphs + requirementsSection + attachmentsSection + shareFooter + '</article>';
  window._currentNoticeId = n.id;
}

function renderRelated(n) {
  var related = KyuDB.notices.filter(x => x.category===n.category && x.id!==n.id).slice(0,3);
  if (!related.length) return;
  var c = document.getElementById('related-notices');
  c.innerHTML = '<div style="border-top:1px solid #cfc6af40;padding-top:48px;"><h3 style="font-size:12px;font-weight:700;letter-spacing:0.1em;color:#5f5e5e;margin-bottom:24px;">MORE IN '+n.category.toUpperCase()+'</h3>' +
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;">' +
    related.map(r =>
      '<a href="notice-detail.html?id='+r.id+'" style="display:block;background:#fff;border:1px solid #cfc6af33;border-radius:8px;padding:20px;text-decoration:none;color:inherit;transition:all 0.2s;" onmouseover="this.style.borderColor=\'#725c00\'" onmouseout="this.style.borderColor=\'#cfc6af33\'">' +
        '<span style="font-size:10px;font-weight:700;letter-spacing:0.1em;color:#725c00;display:block;margin-bottom:8px;">'+r.category.toUpperCase()+'</span>' +
        '<h4 style="font-weight:700;font-size:15px;line-height:1.3;margin:0 0 8px;">'+r.title+'</h4>' +
        '<span style="font-size:12px;color:#7e7663;">'+formatDate(r.date)+'</span>' +
      '</a>'
    ).join('') +
    '</div></div>';
}

function shareNotice() {
  navigator.clipboard.writeText(window.location.href).then(function() {
    showToast('Link copied to clipboard!','success');
  }).catch(function() {
    showToast('Copy the URL from your browser bar.','info');
  });
}

function castVote(type) {
  var voteKey = 'kyu_vote_' + window._currentNoticeId;
  var existing = localStorage.getItem(voteKey);
  if (existing === type) {
    localStorage.removeItem(voteKey);
    document.getElementById('btn-thumbup').style.background='#eeeeee';
    document.getElementById('btn-thumbdown').style.background='#eeeeee';
    showToast('Vote removed.','info');
  } else {
    localStorage.setItem(voteKey, type);
    document.getElementById('btn-thumbup').style.background = type==='up'?'#ebc84e':'#eeeeee';
    document.getElementById('btn-thumbdown').style.background = type==='down'?'#ffdad6':'#eeeeee';
    showToast(type==='up'?'Thanks for your feedback! Marked as helpful.':'Thanks for your feedback!','success');
  }
}
</script>
<script src="js/responsive-nav.js"></script>
</body>
</html>
